<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentBox Town 监视器</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #061018;
      --panel: rgba(7, 17, 26, .82);
      --panel-strong: rgba(10, 23, 34, .94);
      --line: rgba(142, 178, 205, .24);
      --line-strong: rgba(121, 190, 255, .42);
      --ink: #eef7ff;
      --muted: #91a8ba;
      --blue: #1f8fff;
      --green: #48d279;
      --yellow: #ffc742;
      --red: #ff5a62;
      --purple: #8d65ff;
      --cyan: #38d9d0;
      --shadow: 0 18px 50px rgba(0, 0, 0, .42);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(31, 143, 255, .2), transparent 28%),
        radial-gradient(circle at 78% 0%, rgba(72, 210, 121, .15), transparent 25%),
        var(--bg);
      color: var(--ink);
    }
    button, select {
      font: inherit;
      color: var(--ink);
      background: rgba(9, 20, 30, .82);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 13px;
      outline: none;
    }
    button { cursor: pointer; }
    button:hover, select:hover { border-color: var(--line-strong); }
    button.primary { background: rgba(31, 143, 255, .28); border-color: rgba(31, 143, 255, .62); }
    button.danger { background: rgba(255, 90, 98, .14); border-color: rgba(255, 90, 98, .34); }
    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .map-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 25%, rgba(31, 143, 255, .18), transparent 34%),
        linear-gradient(180deg, rgba(3, 10, 16, .65), rgba(3, 10, 16, .9));
      filter: saturate(1.08) contrast(1.04);
      z-index: 0;
    }
    .map-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(2, 8, 12, .55), transparent 22%, transparent 70%, rgba(2, 8, 12, .62)),
        linear-gradient(180deg, rgba(2, 8, 12, .75), transparent 19%, transparent 74%, rgba(2, 8, 12, .84));
    }
    .top, .map-layer, .bottom { position: relative; z-index: 1; }
    .top {
      display: grid;
      gap: 14px;
      padding: 18px 22px 12px;
      background: linear-gradient(180deg, rgba(4, 10, 15, .9), rgba(4, 10, 15, .36), transparent);
    }
    .header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 260px; }
    .menu-btn, .icon-btn {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      padding: 0;
      font-size: 24px;
      border-radius: 14px;
      background: rgba(8, 18, 28, .82);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    h1 { margin: 0; font-size: 22px; line-height: 1.15; letter-spacing: 0; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .status-dot { display: inline-flex; align-items: center; gap: 7px; color: var(--green); font-size: 13px; margin-left: 8px; }
    .status-dot::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: currentColor; box-shadow: 0 0 14px currentColor; }
    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .save-select { min-width: 240px; max-width: 330px; }
    .metric-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 12px;
    }
    .metric {
      min-height: 104px;
      padding: 15px 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(11, 28, 42, .86), rgba(7, 16, 25, .72));
      box-shadow: var(--shadow);
    }
    .metric span { display: block; color: #bdd0de; font-size: 13px; }
    .metric strong { display: block; margin: 10px 0 4px; font-size: 26px; line-height: 1; }
    .metric small { color: var(--muted); font-size: 13px; }
    .metric.warn strong, .metric.warn small { color: var(--red); }
    .metric.ok small { color: var(--green); }
    .map-layer {
      min-height: 0;
      overflow: hidden;
      background: rgba(0, 0, 0, .08);
    }
    .map-world {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
      will-change: transform;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .map-world.dragging { cursor: grabbing; }
    .map-image,
    .map-canvas {
      position: absolute;
      inset: 0;
    }
    .map-image {
      background-image:
        linear-gradient(180deg, rgba(3, 10, 16, .08), rgba(3, 10, 16, .26)),
        url("/mobile-app/assets/town-map-bg.png");
      background-size: 100% 100%;
      background-position: center;
      filter: saturate(1.08) contrast(1.04);
    }
    .toolbox {
      position: absolute;
      left: 22px;
      top: 24px;
      display: grid;
      gap: 9px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(5, 14, 22, .82);
      box-shadow: var(--shadow);
    }
    .tool {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: #d7e9f7;
      display: grid;
      place-items: center;
      font-size: 21px;
    }
    .tool.active { background: rgba(31, 143, 255, .24); color: #7fc0ff; }
    .place-pin {
      position: absolute;
      min-width: 150px;
      max-width: 220px;
      transform: translate(-50%, -100%);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(10, 23, 34, .94), rgba(5, 15, 23, .86));
      color: var(--ink);
      padding: 12px 14px 12px 56px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
      user-select: none;
    }
    .place-pin:hover, .place-pin.selected {
      transform: translate(-50%, -100%) scale(1.04);
      border-color: rgba(31, 143, 255, .85);
      background: linear-gradient(135deg, rgba(15, 70, 119, .95), rgba(6, 20, 34, .9));
    }
    .place-pin.compact {
      min-width: 0;
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(31, 143, 255, .8);
      box-shadow: 0 0 0 4px rgba(31,143,255,.18), 0 8px 22px rgba(0,0,0,.45);
    }
    .place-pin.compact .pin-body { display: none; }
    .place-pin.compact::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: white;
      opacity: .95;
    }
    .pin-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 34px;
      height: 34px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 18px;
      background: var(--blue);
      box-shadow: inset 0 -8px 16px rgba(0,0,0,.18);
    }
    .place-pin[data-tone="green"] .pin-icon { background: var(--green); }
    .place-pin[data-tone="yellow"] .pin-icon { background: #c88428; }
    .place-pin[data-tone="purple"] .pin-icon { background: var(--purple); }
    .place-pin[data-tone="cyan"] .pin-icon { background: var(--cyan); color: #032529; }
    .pin-title { font-size: 18px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pin-meta { margin-top: 4px; font-size: 13px; color: #d8e7f2; }
    .pin-state { margin-top: 6px; font-size: 12px; color: var(--green); }
    .agent-dot {
      position: absolute;
      width: 22px;
      height: 22px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: rgba(31, 143, 255, .88);
      border: 2px solid rgba(224, 243, 255, .9);
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
    }
    .agent-dot.warn { background: var(--red); }
    .agent-dot.idle { background: var(--purple); }
    .right-panel {
      position: absolute;
      right: 22px;
      top: 30px;
      width: min(390px, calc(100vw - 360px));
      max-height: calc(100% - 48px);
      overflow: auto;
      border: 1px solid var(--line-strong);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(8, 20, 30, .94), rgba(5, 13, 20, .92));
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .panel-title { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .panel-title .big-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--blue);
      font-size: 24px;
      flex: 0 0 auto;
    }
    .panel-title h2 { margin: 0; font-size: 20px; }
    .panel-title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .badge { border-radius: 999px; padding: 5px 9px; background: rgba(72, 210, 121, .16); color: var(--green); font-size: 12px; white-space: nowrap; }
    .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin: 16px 0 12px; border-bottom: 1px solid var(--line); }
    .tab { padding: 9px 4px 11px; text-align: center; color: #bbccda; border-bottom: 2px solid transparent; font-size: 14px; }
    .tab.active { color: #4aa4ff; border-color: #4aa4ff; }
    .detail-section {
      padding: 13px;
      border-radius: 12px;
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.045);
      margin-top: 10px;
    }
    .kv { display: grid; grid-template-columns: 92px 1fr; gap: 8px; font-size: 13px; margin: 7px 0; }
    .kv span { color: var(--muted); }
    .kv strong { text-align: right; font-weight: 500; overflow-wrap: anywhere; }
    .list { display: grid; gap: 8px; margin-top: 8px; }
    .list-item { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: start; font-size: 13px; color: #d7e6f2; }
    .bullet { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; background: var(--purple); }
    .list-item small { color: var(--muted); white-space: nowrap; }
    .bottom {
      display: grid;
      grid-template-columns: 1fr 1fr 1.1fr;
      gap: 12px;
      padding: 0 18px 14px;
      background: linear-gradient(0deg, rgba(2, 8, 12, .9), rgba(2, 8, 12, .5), transparent);
    }
    .bottom-card {
      min-height: 174px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(9, 21, 32, .88), rgba(5, 14, 22, .82));
      box-shadow: var(--shadow);
      padding: 14px 16px;
      overflow: hidden;
    }
    .bottom-card h3 { margin: 0 0 10px; font-size: 16px; font-weight: 600; color: #dceaf5; }
    .feed, .logs { max-height: 118px; overflow: auto; display: grid; gap: 7px; padding-right: 4px; }
    .feed-row, .log-row { display: grid; grid-template-columns: 68px 90px 1fr; gap: 8px; color: #cbd9e4; font-size: 13px; }
    .feed-row b { color: var(--yellow); font-weight: 600; }
    .log-row { grid-template-columns: 76px 98px 1fr; }
    .donut-wrap { display: grid; grid-template-columns: 150px 1fr; align-items: center; gap: 16px; }
    .donut {
      width: 136px;
      height: 136px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--green) 0 70%, var(--yellow) 70% 86%, var(--blue) 86% 96%, var(--red) 96% 100%);
      position: relative;
    }
    .donut::after { content: ""; position: absolute; inset: 28px; border-radius: 50%; background: #08141e; box-shadow: inset 0 0 22px rgba(0,0,0,.4); }
    .donut strong { position: relative; z-index: 1; font-size: 26px; }
    .legend { display: grid; gap: 9px; color: #d4e2ec; font-size: 14px; }
    .legend span { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .legend i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .nav {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 16px;
      transform: translateY(100%);
      display: none;
    }
    .empty { color: var(--muted); font-size: 13px; }
    @media (max-width: 1200px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; }
      .metric-row { grid-template-columns: repeat(3, 1fr); }
      .map-layer { height: 720px; }
      .right-panel { width: 360px; }
      .bottom { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="map-bg" aria-hidden="true"></div>
  <div class="app">
    <header class="top">
      <div class="header">
        <div class="brand">
          <button class="menu-btn" type="button" title="菜单">☰</button>
          <div>
            <h1>AgentBox Town <span class="status-dot" id="runState">读取中</span></h1>
            <div class="subtitle" id="subtitle">AI 小镇监视器</div>
          </div>
        </div>
        <div class="controls">
          <select class="save-select" id="saveSelect" title="选择存档"></select>
          <button id="startBtn" class="primary" type="button">启动</button>
          <button id="pauseBtn" type="button">暂停</button>
          <button id="stepBtn" type="button">单步</button>
          <button id="stopBtn" class="danger" type="button">停止</button>
          <button class="icon-btn" type="button" title="设置" onclick="location.href='/'">⚙</button>
          <button class="icon-btn" type="button" title="刷新" onclick="refresh()">↻</button>
        </div>
      </div>
      <section class="metric-row" id="metricsRow"></section>
    </header>

    <main class="map-layer">
      <div class="map-world" id="mapWorld">
        <div class="map-image" aria-hidden="true"></div>
        <div class="map-canvas" id="mapCanvas"></div>
      </div>
      <nav class="toolbox" aria-label="地图工具">
        <button class="tool active" type="button" title="图层">▱</button>
        <button class="tool" type="button" title="筛选">⌯</button>
        <button class="tool" type="button" title="热力">◴</button>
        <button class="tool" type="button" title="定位">⌖</button>
      </nav>
      <aside class="right-panel" id="detailPanel"></aside>
    </main>

    <footer class="bottom">
      <section class="bottom-card">
        <h3>事件流（实时）</h3>
        <div class="feed" id="eventFeed"></div>
      </section>
      <section class="bottom-card">
        <h3>Agent 状态分布</h3>
        <div class="donut-wrap">
          <div class="donut"><strong id="donutTotal">0</strong></div>
          <div class="legend" id="stateLegend"></div>
        </div>
      </section>
      <section class="bottom-card">
        <h3>系统日志（最近）</h3>
        <div class="logs" id="systemLogs"></div>
      </section>
    </footer>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const clamp = (value, min, max) => Math.max(min, Math.min(max, Number(value) || 0));
    const esc = value => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    let selectedPlaceId = "";
    let lastPayload = null;
    let lastRuntime = null;
    let lastCalls = null;
    const mapView = { x: 0, y: 0, scale: 1 };
    const mapBase = { width: 0, height: 0, left: 0, top: 0 };
    const mapDrag = { active: false, pointerId: 0, startX: 0, startY: 0, viewX: 0, viewY: 0, moved: false };
    let suppressMapClick = false;

    async function api(url, options = {}) {
      const res = await fetch(url, { cache: "no-store", ...options });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error?.message || data?.error || res.statusText);
      return data;
    }

    function fmtClock(world) {
      const clock = Number(world?.clock || 0);
      const day = Math.floor(clock / 1440) + 1;
      const minute = ((clock % 1440) + 1440) % 1440;
      const weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      return `${weekdays[(day - 1) % 7]} ${String(Math.floor(minute / 60)).padStart(2, "0")}:${String(minute % 60).padStart(2, "0")}`;
    }

    function selectedSlot() {
      return $("saveSelect").value;
    }

    function placeLabel(id, world) {
      return (world?.places || []).find(place => place.id === id)?.name || id || "未知地点";
    }

    function placeIcon(place) {
      const text = `${place?.id || ""} ${place?.name || ""}`;
      if (/学校|school|education/i.test(text)) return ["🎓", "blue"];
      if (/医院|诊所|clinic|hospital|medical/i.test(text)) return ["✚", "green"];
      if (/餐|饭|restaurant|food|breakfast/i.test(text)) return ["🍴", "yellow"];
      if (/居民|住宅|家|apartment|home|residence/i.test(text)) return ["▦", "purple"];
      if (/图书|library/i.test(text)) return ["▤", "purple"];
      if (/政府|镇务|office|government/i.test(text)) return ["▥", "blue"];
      if (/公园|广场|河|湖|park|square|river|lake/i.test(text)) return ["⌂", "cyan"];
      if (/小卖|商店|market|shop|store/i.test(text)) return ["◈", "yellow"];
      return ["●", "blue"];
    }

    const monitorMapPlacePresets = [
      { re: /kindergarten|幼儿园/i, x: 66.5, y: 23.2 },
      { re: /warehouse|仓库/i, x: 93.4, y: 37.4 },
      { re: /library|图书室|图书馆/i, x: 35.2, y: 35.2 },
      { re: /restaurant|饭馆|餐馆|饭店/i, x: 45.1, y: 31.2 },
      { re: /breakfast|food|早餐|早餐店/i, x: 80.4, y: 12.0 },
      { re: /market|菜市|菜市场|市场/i, x: 48.5, y: 71.2 },
      { re: /square|plaza|center|public|广场|中心/i, x: 40.4, y: 52.8 },
      { re: /school|education|学校/i, x: 56.1, y: 17.2 },
      { re: /clinic|hospital|medical|诊所|医院|社区诊所/i, x: 26.6, y: 48.0 },
      { re: /commercial|old_street|street|商业街|老街/i, x: 35.0, y: 74.0 },
      { re: /store|shop|小卖|小卖部|商店/i, x: 20.0, y: 62.6 },
      { re: /apartment|apartments|residence|home|new_block|居民|居民楼|住宅|小区|家/i, x: 82.2, y: 26.0 },
      { re: /riverside|river|lake|water|河边|湖边|河畔/i, x: 81.3, y: 69.9 },
      { re: /park|garden|公园|花园/i, x: 68.8, y: 52.3 },
      { re: /farm|field|农田|菜地|田/i, x: 12.0, y: 43.0 },
      { re: /mill|waterwheel|磨坊|水车/i, x: 14.0, y: 74.0 },
      { re: /temple|shrine|寺|祠堂|古建筑/i, x: 26.0, y: 17.0 },
      { re: /gate|arch|镇门|牌坊/i, x: 31.0, y: 90.0 },
      { re: /pavilion|亭|湖心亭/i, x: 88.0, y: 75.0 },
      { re: /waterfall|forest|mountain|瀑布|山林|山溪/i, x: 43.0, y: 11.0 },
      { re: /bridge|桥|桥头/i, x: 66.0, y: 88.0 },
      { re: /office|government|community|镇务|镇政|政府|办公|社区中心/i, x: 30.5, y: 14.2 },
      { re: /police|security|警务|警务室|保安/i, x: 48.8, y: 34.7 },
      { re: /factory|workshop|工坊|工点|小工|维修/i, x: 92.7, y: 17.2 },
      { re: /bus|transport|公交|公交站|车站/i, x: 30.5, y: 67.8 }
    ];

    function monitorPlacePoint(place = {}, index = 0) {
      const text = `${place.id || ""} ${place.name || ""} ${place.type || ""}`;
      const preset = monitorMapPlacePresets.find(item => item.re.test(text));
      if (preset) return preset;
      return {
        x: clamp(place.x ?? (15 + (index % 5) * 16), 5, 95),
        y: clamp(place.y ?? (15 + Math.floor(index / 5) * 16), 5, 95)
      };
    }

    function placeStatus(place, count, box) {
      const localEvents = box?.localEvents || [];
      const runtime = box?.agentState?.status || box?.state?.tempo || "";
      if (localEvents.length >= 2 || /忙|拥挤|排队|busy/i.test(runtime)) return ["繁忙", "yellow"];
      if (localEvents.length) return ["有事件", "yellow"];
      if (count === 0) return ["空闲", "muted"];
      return ["正常", "green"];
    }

    function agentCondition(agent) {
      const health = Number(agent?.needs?.health ?? 100);
      const stress = Number(agent?.needs?.stress ?? 100);
      if (agent?.lifeStatus === "dead") return "异常";
      if (agent?.lifeStatus === "critical" || health <= 15) return "异常";
      if (health <= 45 || stress <= 35) return "忙碌";
      if (/等待|观察|休息|停/.test(String(agent?.currentTask || ""))) return "空闲";
      return "正常";
    }

    function progressText(progress) {
      if (!progress || !progress.phase || progress.phase === "idle") return "无任务";
      const percent = Number.isFinite(Number(progress.percent)) ? `${Math.round(Number(progress.percent))}%` : "";
      return `${progress.phase}${percent ? ` ${percent}` : ""}${progress.currentTask ? ` · ${progress.currentTask}` : ""}`;
    }

    function updateMapBase() {
      const layer = document.querySelector(".map-layer");
      const world = $("mapWorld");
      if (!layer || !world) return;
      const rect = layer.getBoundingClientRect();
      const aspect = 1680 / 917;
      let width = rect.width;
      let height = width / aspect;
      if (height < rect.height) {
        height = rect.height;
        width = height * aspect;
      }
      mapBase.width = width;
      mapBase.height = height;
      mapBase.left = (rect.width - width) / 2;
      const topSafeOffset = Math.min(110, Math.max(64, rect.height * 0.1));
      mapBase.top = (rect.height - height) / 2 + topSafeOffset;
      world.style.width = `${width}px`;
      world.style.height = `${height}px`;
      world.style.left = `${mapBase.left}px`;
      world.style.top = `${mapBase.top}px`;
    }

    function clampMapView() {
      const layer = document.querySelector(".map-layer");
      if (!layer) return;
      const rect = layer.getBoundingClientRect();
      updateMapBase();
      const minScale = 0.75;
      const maxScale = 2.8;
      mapView.scale = clamp(mapView.scale, minScale, maxScale);
      const overflowX = Math.max(0, mapBase.width * mapView.scale - rect.width);
      const overflowY = Math.max(0, mapBase.height * mapView.scale - rect.height);
      const padX = Math.max(120, rect.width * 0.18);
      const padY = Math.max(90, rect.height * 0.18);
      mapView.x = clamp(mapView.x, -overflowX - padX, padX);
      mapView.y = clamp(mapView.y, -overflowY - padY, padY);
    }

    function applyMapView() {
      clampMapView();
      const world = $("mapWorld");
      if (world) world.style.transform = `translate3d(${mapView.x}px, ${mapView.y}px, 0) scale(${mapView.scale})`;
    }

    function zoomMapAt(clientX, clientY, delta) {
      const layer = document.querySelector(".map-layer");
      if (!layer) return;
      const rect = layer.getBoundingClientRect();
      const nextScale = clamp(mapView.scale * delta, 0.75, 2.8);
      const focalX = clientX - rect.left - mapBase.left;
      const focalY = clientY - rect.top - mapBase.top;
      const worldX = (focalX - mapView.x) / mapView.scale;
      const worldY = (focalY - mapView.y) / mapView.scale;
      mapView.scale = nextScale;
      mapView.x = focalX - worldX * nextScale;
      mapView.y = focalY - worldY * nextScale;
      applyMapView();
    }

    function resetMapView() {
      mapView.x = 0;
      mapView.y = 0;
      mapView.scale = 1;
      applyMapView();
    }

    function bindMapControls() {
      const world = $("mapWorld");
      const layer = document.querySelector(".map-layer");
      if (!world || !layer || world.dataset.bound === "1") return;
      world.dataset.bound = "1";
      world.addEventListener("pointerdown", event => {
        if (event.button !== 0) return;
        mapDrag.active = true;
        mapDrag.pointerId = event.pointerId;
        mapDrag.startX = event.clientX;
        mapDrag.startY = event.clientY;
        mapDrag.viewX = mapView.x;
        mapDrag.viewY = mapView.y;
        mapDrag.moved = false;
        world.classList.add("dragging");
        world.setPointerCapture(event.pointerId);
      });
      world.addEventListener("pointermove", event => {
        if (!mapDrag.active || event.pointerId !== mapDrag.pointerId) return;
        const dx = event.clientX - mapDrag.startX;
        const dy = event.clientY - mapDrag.startY;
        if (Math.abs(dx) + Math.abs(dy) > 4) mapDrag.moved = true;
        mapView.x = mapDrag.viewX + dx;
        mapView.y = mapDrag.viewY + dy;
        applyMapView();
      });
      const endDrag = event => {
        if (!mapDrag.active || event.pointerId !== mapDrag.pointerId) return;
        if (mapDrag.moved) {
          suppressMapClick = true;
          setTimeout(() => { suppressMapClick = false; }, 80);
        }
        mapDrag.active = false;
        world.classList.remove("dragging");
        try { world.releasePointerCapture(event.pointerId); } catch {}
      };
      world.addEventListener("pointerup", endDrag);
      world.addEventListener("pointercancel", endDrag);
      world.addEventListener("click", event => {
        if (!suppressMapClick) return;
        event.preventDefault();
        event.stopPropagation();
      }, true);
      layer.addEventListener("wheel", event => {
        if (event.target.closest(".right-panel")) return;
        event.preventDefault();
        zoomMapAt(event.clientX, event.clientY, event.deltaY < 0 ? 1.12 : 0.88);
      }, { passive: false });
      layer.addEventListener("dblclick", event => {
        if (event.target.closest(".right-panel")) return;
        resetMapView();
      });
      window.addEventListener("resize", applyMapView);
      applyMapView();
    }

    function renderMetrics(world, metrics, runtime, calls) {
      const agents = world.agents || [];
      const alive = agents.filter(agent => agent.lifeStatus !== "dead").length;
      const abnormal = agents.filter(agent => agentCondition(agent) === "异常").length;
      const running = runtime.state === "running";
      $("runState").textContent = running ? "运行中" : (runtime.state || "未运行");
      $("runState").style.color = running ? "var(--green)" : "var(--yellow)";
      const date = world.weatherBox?.calendar?.date || `第 ${Math.floor((world.clock || 0) / 1440) + 1} 天`;
      const inFlight = Number(metrics.inFlight || 0);
      const recentCalls = (calls.calls || []).slice(0, 60);
      const failed = recentCalls.filter(call => call.status === "error" || call.status === "failed").length;
      const callsPerMin = recentCalls.length ? Math.round(recentCalls.length / 3) : 0;
      const openEvents = (world.records || []).filter(item => item.type !== "debug").length;
      const cards = [
        ["回合", Math.round((world.clock || 0) / Math.max(1, Number(world.config?.virtualMinutesPerPulse || 60))), running ? "↑ 后台演算中" : "后台未运行", "ok"],
        ["模拟时间", fmtClock(world), date, ""],
        ["在线 Agent", `${alive} / ${agents.length}`, agents.length ? `${Math.round(alive / agents.length * 100)}%` : "0%", ""],
        ["API 调用", `${metrics.success || 0}`, `${inFlight} 个进行中 · ${callsPerMin}/min`, inFlight ? "" : "ok"],
        ["事件队列", openEvents, progressText(runtime.progress), ""],
        ["异常", abnormal, failed ? `${failed} 条调用异常` : "暂无异常", abnormal || failed ? "warn" : "ok"]
      ];
      $("metricsRow").innerHTML = cards.map(([label, value, sub, tone]) => `
        <article class="metric ${tone || ""}">
          <span>${esc(label)}</span>
          <strong>${esc(value)}</strong>
          <small>${esc(sub)}</small>
        </article>
      `).join("");
    }

    function renderMap(world) {
      const canvas = $("mapCanvas");
      const places = world.places || [];
      const agents = world.agents || [];
      const boxes = lastPayload?.locationBoxes || {};
      const counts = {};
      agents.forEach(agent => {
        const key = agent.position || agent.place || "";
        if (key) counts[key] = (counts[key] || 0) + 1;
      });
      if (!selectedPlaceId && places.length) selectedPlaceId = places[0].id;
      const topPlaces = [...places].sort((a, b) => (counts[b.id] || 0) - (counts[a.id] || 0)).slice(0, 10);
      const compactPlaces = places.filter(place => !topPlaces.some(item => item.id === place.id));
      const pinHtml = topPlaces.map(place => {
        const point = monitorPlacePoint(place, places.indexOf(place));
        const count = counts[place.id] || 0;
        const box = boxes[place.id] || {};
        const [icon, tone] = placeIcon(place);
        const [status, statusTone] = placeStatus(place, count, box);
        return `<button class="place-pin ${place.id === selectedPlaceId ? "selected" : ""}" data-place="${esc(place.id)}" data-tone="${tone}" style="left:${point.x}%;top:${point.y}%" type="button">
          <span class="pin-icon">${icon}</span>
          <span class="pin-body">
            <span class="pin-title">${esc(place.name || place.id)}</span>
            <span class="pin-meta">${count} 人｜${(box.localEvents || []).length} 事件</span>
            <span class="pin-state" style="color:var(--${statusTone === "muted" ? "muted" : statusTone})">${esc(status)}</span>
          </span>
        </button>`;
      }).join("");
      const compactHtml = compactPlaces.map(place => {
        const point = monitorPlacePoint(place, places.indexOf(place));
        return `<button class="place-pin compact" data-place="${esc(place.id)}" title="${esc(place.name || place.id)}" style="left:${point.x}%;top:${point.y}%" type="button"><span class="pin-body"></span></button>`;
      }).join("");
      const agentHtml = agents.slice(0, 36).map((agent, index) => {
        const place = places.find(item => item.id === (agent.position || agent.place)) || places[index % Math.max(1, places.length)] || { x: 50, y: 50 };
        const point = monitorPlacePoint(place, places.indexOf(place));
        const jitterX = ((index % 5) - 2) * 1.1;
        const jitterY = ((Math.floor(index / 5) % 5) - 2) * 1.1;
        const condition = agentCondition(agent);
        const cls = condition === "异常" ? "warn" : condition === "空闲" ? "idle" : "";
        return `<span class="agent-dot ${cls}" title="${esc(agent.name || agent.id)}｜${esc(place.name || place.id)}" style="left:${clamp(point.x + jitterX, 4, 96)}%;top:${clamp(point.y + jitterY + 2, 5, 95)}%"></span>`;
      }).join("");
      canvas.innerHTML = `${agentHtml}${pinHtml}${compactHtml}`;
      canvas.querySelectorAll("[data-place]").forEach(button => {
        button.addEventListener("click", () => {
          if (suppressMapClick) return;
          selectedPlaceId = button.dataset.place;
          renderMap(world);
          renderDetail(world);
        });
      });
      applyMapView();
    }

    function renderDetail(world) {
      const places = world.places || [];
      const agents = world.agents || [];
      const boxes = lastPayload?.locationBoxes || {};
      const place = places.find(item => item.id === selectedPlaceId) || places[0] || { id: "town", name: "小镇" };
      selectedPlaceId = place.id;
      const count = agents.filter(agent => (agent.position || agent.place) === place.id).length;
      const residents = agents.filter(agent => (agent.position || agent.place) === place.id).slice(0, 8);
      const box = boxes[place.id] || {};
      const events = (box.localEvents || []).slice(0, 4);
      const [icon, tone] = placeIcon(place);
      const [status] = placeStatus(place, count, box);
      const runtime = world.locationRuntime?.[place.id] || {};
      $("detailPanel").innerHTML = `
        <div class="panel-head">
          <div class="panel-title">
            <span class="big-icon" style="background:var(--${tone === "blue" ? "blue" : tone})">${icon}</span>
            <div>
              <h2>${esc(place.name || place.id)}</h2>
              <p>地点 ID: ${esc(place.id)}</p>
            </div>
          </div>
          <span class="badge">${esc(status)}</span>
        </div>
        <div class="tabs">
          <div class="tab active">概览</div>
          <div class="tab">Agent (${count})</div>
          <div class="tab">事件 (${events.length})</div>
          <div class="tab">日志</div>
        </div>
        <section class="detail-section">
          <div class="kv"><span>类型</span><strong>${esc(place.type || runtime.mode || "普通地点")}</strong></div>
          <div class="kv"><span>当前人数</span><strong>${count} / ${place.capacity || "--"}</strong></div>
          <div class="kv"><span>地点运行</span><strong>${esc(runtime.summary || box.agentState?.status || box.state?.tempo || "平稳")}</strong></div>
          <div class="kv"><span>天气影响</span><strong>${esc((world.weatherBox?.impacts || []).slice(0, 2).join("；") || "无明显影响")}</strong></div>
        </section>
        <section class="detail-section">
          <strong>当前事件</strong>
          <div class="list">
            ${events.length ? events.map(event => `<div class="list-item"><span class="bullet"></span><span>${esc(event.title || event.summary || "地点事件")}<br><small>${esc(event.summary || event.body || "")}</small></span><small>${esc(event.stage || "进行中")}</small></div>`).join("") : `<div class="empty">暂无地点事件</div>`}
          </div>
        </section>
        <section class="detail-section">
          <strong>最近在场 Agent</strong>
          <div class="list">
            ${residents.length ? residents.map(agent => `<div class="list-item"><span class="bullet" style="background:${agentCondition(agent) === "异常" ? "var(--red)" : "var(--blue)"}"></span><span>${esc(agent.name || agent.id)}<br><small>${esc(agent.job || agent.role || "居民")}｜${esc(agent.currentTask || "观察当前环境")}</small></span><small>${esc(agentCondition(agent))}</small></div>`).join("") : `<div class="empty">当前地点无人</div>`}
          </div>
        </section>
      `;
    }

    function renderBottom(world, calls) {
      const records = (world.records || world.logs || []).slice(0, 24);
      $("eventFeed").innerHTML = records.length ? records.slice(0, 8).map(item => `
        <div class="feed-row">
          <span>${esc(item.time || fmtClock({ clock: item.clock || world.clock || 0 }).slice(-5))}</span>
          <b>${esc(placeLabel(item.place || item.location || item.source || "", world)).slice(0, 8)}</b>
          <span>${esc(item.title || item.body || item.summary || "事件更新")}</span>
        </div>
      `).join("") : `<div class="empty">暂无事件记录</div>`;

      const agents = world.agents || [];
      const normal = agents.filter(agent => agentCondition(agent) === "正常").length;
      const busy = agents.filter(agent => agentCondition(agent) === "忙碌").length;
      const idle = agents.filter(agent => agentCondition(agent) === "空闲").length;
      const abnormal = agents.filter(agent => agentCondition(agent) === "异常").length;
      $("donutTotal").textContent = agents.length;
      $("stateLegend").innerHTML = [
        ["正常", normal, "var(--green)"],
        ["忙碌", busy, "var(--yellow)"],
        ["空闲", idle, "var(--blue)"],
        ["异常", abnormal, "var(--red)"]
      ].map(([label, value, color]) => `<span><em><i style="background:${color}"></i>${label}</em><b>${value} (${agents.length ? Math.round(value / agents.length * 100) : 0}%)</b></span>`).join("");

      const callRows = (calls.calls || []).slice(0, 10);
      $("systemLogs").innerHTML = callRows.length ? callRows.map(call => `
        <div class="log-row">
          <span>${new Date(call.at || Date.now()).toLocaleTimeString("zh-CN", { hour12: false })}</span>
          <b>${esc(call.task || "AI")}</b>
          <span>${esc(call.status || "unknown")}｜Key ${esc(call.keyIndex ?? "-")}｜${esc(call.error || `${call.durationMs || 0}ms`)}</span>
        </div>
      `).join("") : `<div class="empty">暂无调用日志</div>`;
    }

    async function refresh() {
      const [savesData, metrics, runtime, calls] = await Promise.all([
        api("/api/saves"),
        api("/api/metrics"),
        api("/api/runtime/status"),
        api("/api/calls")
      ]);
      lastRuntime = runtime;
      lastCalls = calls;
      const select = $("saveSelect");
      const previous = select.value;
      select.innerHTML = (savesData.saves || []).map(save => `<option value="${esc(save.slot)}">${esc(save.name || save.slot)}｜${save.agentCount || 0}人｜${esc(save.clockText || "")}</option>`).join("");
      if (previous && [...select.options].some(item => item.value === previous)) select.value = previous;
      const slot = selectedSlot() || savesData.saves?.[0]?.slot || "";
      lastPayload = slot ? await api(`/api/saves/${encodeURIComponent(slot)}`) : { world: {}, locationBoxes: {} };
      const world = lastPayload.world || {};
      $("subtitle").textContent = `${lastPayload.meta?.name || slot || "无存档"} · ${fmtClock(world)} · ${world.agents?.length || 0} 人`;
      renderMetrics(world, metrics, runtime, calls);
      renderMap(world);
      renderDetail(world);
      renderBottom(world, calls);
    }

    $("startBtn").onclick = async () => {
      await api("/api/runtime/start", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ slot: selectedSlot(), engine: "node-core-v1" }) });
      await refresh();
    };
    $("pauseBtn").onclick = async () => {
      await api("/api/runtime/pause", { method: "POST" });
      await refresh();
    };
    $("stepBtn").onclick = async () => {
      await api("/api/runtime/step", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ slot: selectedSlot(), engine: "node-core-v1" }) });
      await refresh();
    };
    $("stopBtn").onclick = async () => {
      await api("/api/runtime/stop", { method: "POST" });
      await refresh();
    };
    $("saveSelect").onchange = () => {
      selectedPlaceId = "";
      refresh();
    };
    bindMapControls();
    document.querySelectorAll(".tool").forEach(button => {
      if (button.title === "定位") button.addEventListener("click", resetMapView);
    });
    refresh().catch(error => {
      $("subtitle").textContent = error.message;
      $("metricsRow").innerHTML = `<article class="metric warn"><span>读取失败</span><strong>!</strong><small>${esc(error.message)}</small></article>`;
    });
    setInterval(() => refresh().catch(() => {}), 3000);
  </script>
</body>
</html>
